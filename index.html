<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DontPayFullPrice — Best Coupons &amp; Promo Codes</title>
  <meta name="description" content="Find the best coupons, promo codes and discount deals. Save money every time you shop online." />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="v2-style.css" />
</head>
<body>

  <!-- ═══════════ HEADER / HERO ═══════════ -->
  <header class="v2-header">
    <div class="v2-search-wrap">
      <h1>🏷 Don't Pay Full Price</h1>
      <p>Hundreds of coupons &amp; promo codes updated daily</p>

      <div class="v2-search-row">
        <input
          id="v2-search"
          type="search"
          autocomplete="off"
          placeholder="Search by store, brand or keyword…"
          aria-label="Search coupons"
        />
        <button id="v2-search-btn" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          Search
        </button>
      </div>
    </div>
  </header>

  <!-- ═══════════ STICKY FILTER BAR ═══════════ -->
  <div class="v2-sticky-bar">
    <div class="v2-filter-inner">

      <!-- Promo-code only toggle -->
      <label id="v2-promo-toggle" class="v2-toggle-btn" role="button" tabindex="0" aria-pressed="false">
        <input id="v2-promo-cb" type="checkbox" />
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
        Promo codes only
      </label>

      <!-- Category filter -->
      <select id="v2-category" class="v2-select" aria-label="Filter by category">
        <option value="all">All categories</option>
      </select>

      <!-- Merchant filter -->
      <select id="v2-merchant" class="v2-select" aria-label="Filter by merchant">
        <option value="all">All merchants</option>
      </select>

      <!-- Result count -->
      <span id="v2-count" class="v2-result-count">Loading…</span>
    </div>
  </div>

  <!-- ═══════════ MAIN GRID ═══════════ -->
  <main class="v2-main">
    <div id="v2-grid" class="v2-grid" role="list" aria-live="polite" aria-label="Coupon deals">
      <!-- cards injected by v2-app.js -->
    </div>
  </main>

  <!-- ═══════════ FOOTER ═══════════ -->
  <footer style="text-align:center;padding:2rem 1rem;font-size:.8rem;color:#94a3b8;">
    Deals sourced via Admitad. Prices &amp; availability may vary. &copy; DontPayFullPrice
  </footer>

  <script src="v2-app.js"></script>
</body>
</html>
